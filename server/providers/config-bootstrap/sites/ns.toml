# MAST per-machine bootstrap configuration -- site: ns (Neot Smadar production).
# Deployed verbatim by the config-bootstrap provisioning provider as
# C:\WIS\unit.toml. Read by MAST_common load_local_config(); the app also
# cross-checks site/project/controller_host/location against the DB 'sites'
# document at startup, so these MUST agree with that doc.
#
# location matches the DB 'sites' doc for ns (read 2026-06-29).
site = "ns"
project = "mast"
controller_host = "mast-ns-control"
database = "mast"
domain = "weizmann.ac.il"
# mongo_port = 27017

[location]
latitude = 30.0533026
longitude = 35.0386461
elevation = 400
